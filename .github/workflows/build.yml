name: Build Multi-Version

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 – STABLE  (Minecraft 1.21.x · Yarn Mappings · Java 21)
  # ════════════════════════════════════════════════════════════════════════════
  build-stable:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { minecraft: "1.21.4",  java: "21", yarn_build: "3" }
          - { minecraft: "1.21.5",  java: "21", yarn_build: "1" }
          - { minecraft: "1.21.10", java: "21", yarn_build: "3" }
          - { minecraft: "1.21.11", java: "21", yarn_build: "4" }

    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }} (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build – MC ${{ matrix.minecraft }} / Java ${{ matrix.java }} / Yarn build.${{ matrix.yarn_build }}
        run: |
          ./gradlew build \
            -Pminecraft_version=${{ matrix.minecraft }} \
            -Pyarn_mappings=${{ matrix.minecraft }}+build.${{ matrix.yarn_build }} \
            -Pjava_version=${{ matrix.java }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MikuTester-mc${{ matrix.minecraft }}-java${{ matrix.java }}
          path: build/libs/mikutester-*.jar
          if-no-files-found: error

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 – EXPERIMENTAL  (Minecraft 26.1 · Mojang Official Mappings · Java 21)
  # ════════════════════════════════════════════════════════════════════════════
  build-experimental:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build – MC 26.1 / Java 25 / Mojang Official Mappings
        run: |
          ./gradlew build \
            -Pminecraft_version=26.1 \
            -Pjava_version=25

      - name: Upload artifact (experimental)
        uses: actions/upload-artifact@v4
        with:
          name: MikuTester-mc26.1-java25-experimental
          path: build/libs/mikutester-*.jar

  release:
    needs: [build-stable, build-experimental]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-jars
          pattern: MikuTester-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-jars/*.jar
          body: |
            Automated build for multiple Minecraft versions.
            Stable: 1.21.4 to 1.21.11
            Experimental: 26.1
          draft: false
          prerelease: false
