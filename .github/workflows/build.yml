name: Build Multi-Version

on:
  push:
    branches: [ "main" ]
    tags: [ "v*", "V*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 – STABLE  (Minecraft 1.21.x · Yarn Mappings · Java 21)
  # ════════════════════════════════════════════════════════════════════════════
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { minecraft: "1.21.4",  java: "21", yarn_build: "3" }
          - { minecraft: "1.21.5",  java: "21", yarn_build: "1" }
          - { minecraft: "1.21.6",  java: "21", yarn_build: "1" }
          - { minecraft: "1.21.7",  java: "21", yarn_build: "7" }
          - { minecraft: "1.21.8",  java: "21", yarn_build: "1" }
          - { minecraft: "1.21.10", java: "21", yarn_build: "3" }
          - { minecraft: "1.21.11", java: "21", yarn_build: "4" }

    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }} (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build – MC ${{ matrix.minecraft }} / Java ${{ matrix.java }} / Yarn build.${{ matrix.yarn_build }}
        run: |
          ./gradlew build \
            -Pminecraft_version=${{ matrix.minecraft }} \
            -Pyarn_mappings=${{ matrix.minecraft }}+build.${{ matrix.yarn_build }} \
            -Pjava_version=${{ matrix.java }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MikuTester-mc${{ matrix.minecraft }}-java${{ matrix.java }}
          path: build/libs/mikutester-*.jar
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-jars
          pattern: MikuTester-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-jars/*.jar
          body: |
            Automated build for Minecraft 1.21.x versions.
          draft: false
          prerelease: false
