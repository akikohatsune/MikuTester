name: Build Multi-Version

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        minecraft: ["1.21.4", "1.21.5", "1.21.6", "1.21.7", "1.21.8", "1.21.10", "1.21.11", "26.1"]
    
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: |
        # Determine yarn mapping build number based on version
        YARN_BUILD="1"
        if [[ "${{ matrix.minecraft }}" == "1.21.4" ]]; then YARN_BUILD="3"; fi
        
        ./gradlew build \
          -Pminecraft_version=${{ matrix.minecraft }} \
          -Pyarn_mappings=${{ matrix.minecraft }}+build.$YARN_BUILD
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MikuTester-${{ matrix.minecraft }}
        path: build/libs/mikutester-*.jar
