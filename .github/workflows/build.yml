name: Build Multi-Version

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        minecraft: ["1.21.4", "1.21.5", "1.21.6", "1.21.7", "1.21.8", "1.21.10", "1.21.11", "1.26.1"]
    
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.minecraft == '26.1' && '25' || '21' }}
        distribution: 'temurin'
        cache: 'gradle'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: |
        # Determine yarn mapping build number and java version
        YARN_BUILD="1"
        if [[ "${{ matrix.minecraft }}" == "1.21.4" ]]; then YARN_BUILD="3"; fi
        
        JAVA_VER="21"
        if [[ "${{ matrix.minecraft }}" == "1.26.1" ]]; then JAVA_VER="25"; fi
        
        ./gradlew build \
          -Pminecraft_version=${{ matrix.minecraft }} \
          -Pyarn_mappings=${{ matrix.minecraft }}+build.$YARN_BUILD \
          -Pjava_version=$JAVA_VER

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MikuTester-${{ matrix.minecraft }}
        path: build/libs/mikutester-*.jar
        
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-jars
          pattern: MikuTester-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-jars/*.jar
          body: |
            Automated build for multiple Minecraft versions.
            Range: 1.21.4 to 26.1
          draft: false
          prerelease: false
